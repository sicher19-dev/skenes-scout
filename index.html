let selectedIdx = 0, currentFilter = 'career', currentPitch = 'FF';

function showPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
}
function setFilter(f, btn) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderLineup(); renderDetail(); renderOverview();
}
function setPitch(p, btn) {
  currentPitch = p;
  document.querySelectorAll('.pitch-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderHeatmap(BATTERS[selectedIdx], 'heatmap-content');
}
function heatColor(v) {
  if (v < 0.22) return '#3B6D11';
  if (v < 0.35) return '#639922';
  if (v < 0.45) return '#C0DD97';
  if (v < 0.55) return '#FAC775';
  if (v < 0.62) return '#D85A30';
  return '#993C1D';
}
function heatText(v) { return v < 0.35 ? '#EAF3DE' : v < 0.55 ? '#27251F' : '#FAECE7'; }
function makeHeatmapHTML(b, f) {
  let html = '<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;">';
  b.heatmap[f].flat().forEach(v => {
    html += `<div style="height:24px;border-radius:2px;background:${heatColor(v)};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:${heatText(v)};">.${Math.round(v*1000).toString().padStart(3,'0').slice(1)}</div>`;
  });
  return html + '</div>';
}
function renderHeatmap(b, id) {
  let html = makeHeatmapHTML(b, currentFilter);
  html += `<div class="legend-row"><span class="legend-item"><span class="legend-dot" style="background:#3B6D11"></span>cold</span><span class="legend-item"><span class="legend-dot" style="background:#FAC775"></span>warm</span><span class="legend-item"><span class="legend-dot" style="background:#993C1D"></span>hot</span></div>`;
  document.getElementById(id).innerHTML = html;
}
function renderSpray(b) {
  const colors = ['#B4B2A9','#639922','#D85A30'];
  let svg = '<svg viewBox="0 0 220 240" width="100%" style="display:block;">';
  svg += '<path d="M110,230 L10,130 A105,105 0 0,1 210,130 Z" fill="none" stroke="#ccc" stroke-width="0.5"/>';
  svg += '<path d="M110,230 L35,155 A85,85 0 0,1 185,155 Z" fill="none" stroke="#ccc" stroke-width="0.5"/>';
  svg += '<line x1="110" y1="230" x2="110" y2="120" stroke="#ccc" stroke-width="0.5"/>';
  svg += '<line x1="110" y1="230" x2="35" y2="155" stroke="#ccc" stroke-width="0.5"/>';
  svg += '<line x1="110" y1="230" x2="185" y2="155" stroke="#ccc" stroke-width="0.5"/>';
  b.spray.forEach(([x,y,t]) => { svg += `<circle cx="${x}" cy="${y}" r="4" fill="${colors[t]}" fill-opacity="0.75"/>`; });
  svg += '</svg>';
  svg += `<div class="legend-row">${['out','single','xbh'].map((l,i)=>`<span class="legend-item"><span class="legend-dot" style="background:${colors[i]}"></span>${l}</span>`).join('')}</div>`;
  document.getElementById('spray-content').innerHTML = svg;
}
function renderCountTend(b) {
  const counts = ['0-0','0-1','0-2','1-0','1-1','1-2','2-0','2-1','2-2','3-0','3-1','3-2'];
  const vals = b.countTend[currentFilter];
  let html = '<div style="font-size:9px;color:#6b6b66;margin-bottom:6px;">swing rate by count</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;">';
  counts.forEach((c,i) => {
    const v = vals[i], pct = Math.round(v*100);
    const bg = v<0.25?'#B5D4F4':v<0.38?'#85B7EB':v<0.48?'#FAC775':'#D85A30';
    const tc = v<0.38?'#042C53':'#27251F';
    html += `<div style="border-radius:3px;background:${bg};padding:4px 2px;text-align:center;"><div style="font-size:9px;color:${tc};opacity:0.7;">${c}</div><div style="font-size:10px;font-weight:600;color:${tc};">${pct}%</div></div>`;
  });
  document.getElementById('count-content').innerHTML = html + '</div>';
}
function renderTrend(b) {
  const t = b.trend[currentFilter];
  const metrics = [{label:'AVG',val:'.'+t.avg,bar:t.avg/400},{label:'OBP',val:'.'+t.obp,bar:t.obp/450},{label:'SLG',val:'.'+t.slg,bar:t.slg/600},{label:'K%',val:t.kpct+'%',bar:t.kpct/40,inv:true},{label:'SwStr',val:t.swstr+'%',bar:t.swstr/25,inv:true}];
  let html = '<div class="trend-rows">';
  metrics.forEach(m => {
    const w = Math.min(100,Math.round(m.bar*100));
    const color = m.inv?(w>55?'#D85A30':'#639922'):(w>55?'#639922':'#D85A30');
    html += `<div class="trend-row"><span class="trend-lbl">${m.label}</span><div class="trend-bg"><div class="trend-fill" style="width:${w}%;background:${color};"></div></div><span class="trend-val">${m.val}</span></div>`;
  });
  document.getElementById('trend-content').innerHTML = html + '</div>';
}
function renderLineup() {
  document.getElementById('lineup').innerHTML = BATTERS.map((b,i) => `
    <div class="batter-row ${i===selectedIdx?'selected':''}" onclick="selectBatter(${i})">
      <span class="order-num">${b.order}</span>
      <div class="batter-info"><div class="batter-name">${b.name}</div><div class="batter-sub">${b.pos}</div></div>
      <span class="hand-badge">${b.hand}</span>
      <span class="avg-val">${b.avg[currentFilter]}</span>
    </div>`).join('');
}
function renderDetail() {
  const b = BATTERS[selectedIdx], f = currentFilter;
  const tC = b.threat==='high'?'threat-high':b.threat==='med'?'threat-med':'threat-low';
  const tL = b.threat==='high'?'High threat':b.threat==='med'?'Medium threat':'Low threat';
  document.getElementById('detail').innerHTML = `
    <div class="player-header">
      <div class="player-name-big">${b.name}<span class="player-meta">#${b.order} · ${b.pos} · ${b.hand}HB</span></div>
      <div class="stats-row">
        <div class="stat-item"><span class="stat-label">AVG</span><span class="stat-val">${b.avg[f]}</span></div>
        <div class="stat-item"><span class="stat-label">OBP</span><span class="stat-val">${b.obp[f]}</span></div>
        <div class="stat-item"><span class="stat-label">SLG</span><span class="stat-val">${b.slg[f]}</span></div>
        <div class="stat-item"><span class="stat-label">K%</span><span class="stat-val">${b.kpct[f]}</span></div>
        <div class="stat-item"><span class="stat-label">BB%</span><span class="stat-val">${b.bb[f]}</span></div>
      </div>
    </div>
    <div class="card">
      <div class="card-title">heat map — BA by zone</div>
      <div class="pitch-tabs">
        ${['FF','SL','CH','CU'].map(p=>`<button class="pitch-tab ${p===currentPitch?'active':''}" onclick="setPitch('${p}',this)">${{FF:'4-seam',SL:'slider',CH:'changeup',CU:'curveball'}[p]}</button>`).join('')}
      </div>
      <div id="heatmap-content"></div>
    </div>
    <div class="charts-row">
      <div class="card"><div class="card-title">spray chart</div><div id="spray-content"></div></div>
      <div class="card"><div class="card-title">count tendencies</div><div id="count-content"></div></div>
      <div class="card"><div class="card-title">recent performance</div><div id="trend-content"></div></div>
    </div>
    <div class="card">
      <div class="card-title">platoon splits</div>
      <div class="platoon-grid">
        <div class="platoon-card"><div class="platoon-side">vs RHP (Skenes)</div><div class="platoon-stat">${b.platoon.vR.avg}</div><div class="platoon-sub">OPS ${b.platoon.vR.ops} · ${b.platoon.vR.pa} PA</div></div>
        <div class="platoon-card"><div class="platoon-side">vs LHP</div><div class="platoon-stat">${b.platoon.vL.avg}</div><div class="platoon-sub">OPS ${b.platoon.vL.ops} · ${b.platoon.vL.pa} PA</div></div>
      </div>
    </div>
    <div class="notes-card">
      <div class="notes-header"><div class="notes-icon">!</div><div class="notes-title">Pitcher's notes — Paul Skenes</div></div>
      <span class="threat-badge ${tC}">${tL}</span>
      <p class="notes-body">${b.notes}</p>
      <div class="notes-tags">${b.tags.map(t=>`<span class="notes-tag">${t}</span>`).join('')}</div>
    </div>`;
  renderHeatmap(b,'heatmap-content'); renderSpray(b); renderCountTend(b); renderTrend(b);
}
function renderOverview() {
  const tC = t => t==='high'?'threat-high':t==='med'?'threat-med':'threat-low';
  const tL = t => t==='high'?'High threat':t==='med'?'Medium threat':'Low threat';
  document.getElementById('overview-grid').innerHTML = BATTERS.map((b,i) => `
    <div class="overview-card" onclick="openDetail(${i})">
      <span class="threat-badge ${tC(b.threat)}">${tL(b.threat)}</span>
      <div class="ov-name">${b.order}. ${b.name}</div>
      <div class="ov-meta">${b.pos} · ${b.hand}HB</div>
      ${makeHeatmapHTML(b, currentFilter)}
      <div class="ov-stats">
        <div class="ov-stat"><span class="ov-stat-lbl">AVG</span><span class="ov-stat-val">${b.avg[currentFilter]}</span></div>
        <div class="ov-stat"><span class="ov-stat-lbl">OPS</span><span class="ov-stat-val">${(parseFloat(b.obp[currentFilter])+parseFloat(b.slg[currentFilter])).toFixed(3)}</span></div>
        <div class="ov-stat"><span class="ov-stat-lbl">K%</span><span class="ov-stat-val">${b.kpct[currentFilter]}</span></div>
      </div>
    </div>`).join('');
}
function openDetail(i) {
  selectedIdx = i; currentPitch = 'FF';
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-tab').forEach(b => b.classList.remove('active'));
  document.getElementById('page-detail').classList.add('active');
  document.querySelectorAll('.nav-tab')[1].classList.add('active');
  renderLineup(); renderDetail();
}
function selectBatter(i) { selectedIdx = i; currentPitch = 'FF'; renderLineup(); renderDetail(); }

renderOverview(); renderLineup(); renderDetail();
</script>
