let sel=0,cf='career',cp='FF';
function showPage(n,btn){document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));document.getElementById('page-'+n).classList.add('active');btn.classList.add('active')}
function setFilter(f,btn){cf=f;document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rL();rD();rO()}
function setPitch(p,btn){cp=p;document.querySelectorAll('.pitch-tab').forEach(b=>b.classList.remove('active'));btn.classList.add('active');rHM(B[sel],'hmc')}
function hC(v){return v<.22?'#3B6D11':v<.35?'#639922':v<.45?'#C0DD97':v<.55?'#FAC775':v<.62?'#D85A30':'#993C1D'}
function hT(v){return v<.35?'#EAF3DE':v<.55?'#27251F':'#FAECE7'}
function mHM(b,f){let h='<div style="display:grid;grid-template-columns:repeat(4,1fr);gap:2px;">';b.heatmap[f].flat().forEach(v=>{h+=`<div style="height:24px;border-radius:2px;background:${hC(v)};display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:600;color:${hT(v)};">.${Math.round(v*1000).toString().padStart(3,'0').slice(1)}</div>`});return h+'</div>'}
function rHM(b,id){let h=mHM(b,cf);h+='<div class="legend-row"><span class="legend-item"><span class="legend-dot" style="background:#3B6D11"></span>cold</span><span class="legend-item"><span class="legend-dot" style="background:#FAC775"></span>warm</span><span class="legend-item"><span class="legend-dot" style="background:#993C1D"></span>hot</span></div>';document.getElementById(id).innerHTML=h}
function rCT(b){const counts=['0-0','0-1','0-2','1-0','1-1','1-2','2-0','2-1','2-2','3-0','3-1','3-2'];const vals=b.countTend[cf];let h='<div style="font-size:9px;color:#6b6b66;margin-bottom:6px;">swing rate by count</div><div style="display:grid;grid-template-columns:repeat(4,1fr);gap:3px;">';counts.forEach((c,i)=>{const v=vals[i],pct=Math.round(v*100);const bg=v<.25?'#B5D4F4':v<.38?'#85B7EB':v<.48?'#FAC775':'#D85A30';const tc=v<.38?'#042C53':'#27251F';h+=`<div style="border-radius:3px;background:${bg};padding:4px 2px;text-align:center;"><div style="font-size:9px;color:${tc};opacity:.7;">${c}</div><div style="font-size:10px;font-weight:600;color:${tc};">${pct}%</div></div>`});document.getElementById('ctc').innerHTML=h+'</div>'}
function rTr(b){const t=b.trend[cf];const m=[{l:'AVG',v:'.'+t.avg,b:t.avg/400},{l:'OBP',v:'.'+t.obp,b:t.obp/450},{l:'SLG',v:'.'+t.slg,b:t.slg/600},{l:'K%',v:t.kpct+'%',b:t.kpct/40,inv:true},{l:'SwStr',v:t.swstr+'%',b:t.swstr/25,inv:true}];let h='<div class="trend-rows">';m.forEach(x=>{const w=Math.min(100,Math.round(x.b*100));const c=x.inv?(w>55?'#D85A30':'#639922'):(w>55?'#639922':'#D85A30');h+=`<div class="trend-row"><span class="trend-lbl">${x.l}</span><div class="trend-bg"><div class="trend-fill" style="width:${w}%;background:${c};"></div></div><span class="trend-val">${x.v}</span></div>`});document.getElementById('trc').innerHTML=h+'</div>'}
function rL(){document.getElementById('lineup').innerHTML=B.map((b,i)=>`<div class="batter-row ${i===sel?'selected':''}" onclick="sB(${i})"><span class="order-num">${b.order}</span><div class="batter-info"><div class="batter-name">${b.name}</div><div class="batter-sub">${b.pos}</div></div><span class="hand-badge">${b.hand}</span><span class="avg-val">${b.avg[cf]}</span></div>`).join('')}
function rD(){const b=B[sel],f=cf;const tC=b.threat==='high'?'threat-high':b.threat==='med'?'threat-med':'threat-low';const tL=b.threat==='high'?'High threat':b.threat==='med'?'Medium threat':'Low threat';
document.getElementById('detail').innerHTML=`<div class="player-header"><div class="player-name-big">${b.name}<span class="player-meta">#${b.order} · ${b.pos} · ${b.hand}HB</span></div><div class="stats-row"><div class="stat-item"><span class="stat-label">AVG</span><span class="stat-val">${b.avg[f]}</span></div><div class="stat-item"><span class="stat-label">OBP</span><span class="stat-val">${b.obp[f]}</span></div><div class="stat-item"><span class="stat-label">SLG</span><span class="stat-val">${b.slg[f]}</span></div><div class="stat-item"><span class="stat-label">K%</span><span class="stat-val">${b.kpct[f]}</span></div><div class="stat-item"><span class="stat-label">BB%</span><span class="stat-val">${b.bb[f]}</span></div></div></div>
<div class="card"><div class="card-title">heat map — BA by zone</div><div class="pitch-tabs">${['FF','SL','CH','CU'].map(p=>`<button class="pitch-tab ${p===cp?'active':''}" onclick="setPitch('${p}',this)">${{FF:'4-seam',SL:'slider',CH:'changeup',CU:'curveball'}[p]}</button>`).join('')}</div><div id="hmc"></div></div>
<div class="charts-row"><div class="card"><div class="card-title">count tendencies</div><div id="ctc"></div></div><div class="card"><div class="card-title">recent performance</div><div id="trc"></div></div></div>
<div class="card"><div class="card-title">platoon splits</div><div class="platoon-grid"><div class="platoon-card"><div class="platoon-side">vs RHP (Skenes)</div><div class="platoon-stat">${b.platoon.vR.avg}</div><div class="platoon-sub">OPS ${b.platoon.vR.ops} · ${b.platoon.vR.pa} PA</div></div><div class="platoon-card"><div class="platoon-side">vs LHP</div><div class="platoon-stat">${b.platoon.vL.avg}</div><div class="platoon-sub">OPS ${b.platoon.vL.ops} · ${b.platoon.vL.pa} PA</div></div></div></div>
<div class="notes-card"><div class="notes-header"><div class="notes-icon">!</div><div class="notes-title">Pitcher's notes — Paul Skenes</div></div><span class="threat-badge ${tC}">${tL}</span><p class="notes-body">${b.notes}</p><div class="notes-tags">${b.tags.map(t=>`<span class="notes-tag">${t}</span>`).join('')}</div></div>`;
rHM(b,'hmc');rCT(b);rTr(b)}
function rO(){const tC=t=>t==='high'?'threat-high':t==='med'?'threat-med':'threat-low';const tL=t=>t==='high'?'High threat':t==='med'?'Medium threat':'Low threat';document.getElementById('overview-grid').innerHTML=B.map((b,i)=>`<div class="overview-card" onclick="oD(${i})"><span class="threat-badge ${tC(b.threat)}">${tL(b.threat)}</span><div class="ov-name">${b.order}. ${b.name}</div><div class="ov-meta">${b.pos} · ${b.hand}HB</div>${mHM(b,cf)}<div class="ov-stats"><div class="ov-stat"><span class="ov-stat-lbl">AVG</span><span class="ov-stat-val">${b.avg[cf]}</span></div><div class="ov-stat"><span class="ov-stat-lbl">OPS</span><span class="ov-stat-val">${(parseFloat(b.obp[cf])+parseFloat(b.slg[cf])).toFixed(3)}</span></div><div class="ov-stat"><span class="ov-stat-lbl">K%</span><span class="ov-stat-val">${b.kpct[cf]}</span></div></div></div>`).join('')}
function oD(i){sel=i;cp='FF';document.querySelectorAll('.page').forEach(p=>p.classList.remove('active'));document.querySelectorAll('.nav-tab').forEach(b=>b.classList.remove('active'));document.getElementById('page-detail').classList.add('active');document.querySelectorAll('.nav-tab')[1].classList.add('active');rL();rD()}
function sB(i){sel=i;cp='FF';rL();rD()}
rO();rL();rD();
</script>
